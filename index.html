<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sigil Test - Light to Line</title>
<style>
  body {
    background: #fff; /* 背景をシロに変更 */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    width: 300px;
  }
  path, circle {
    stroke: #111; /* 線をクロに変更 */
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#soft-blur); /* 線のトゲを消すふんわりフィルター */
  }

  /* --- ① 光の粒子の設定 --- */
  #glow-particle {
    fill: #111; /* 光の玉も今回はクロ（淡い影のような光） */
    stroke: none;
    opacity: 0;
    /* 動きまわる変化（位置と不透明度）を滑らかにする設定 */
    transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
  }

  /* --- アニメーション制御用のクラス --- */
  .fade-in {
    transition: opacity 0.6s ease;
    opacity: 1;
  }

  /* 線がじわっと浮き上がりながら伸びる（1.8秒） */
  .draw-line {
    transition: stroke-dashoffset 1.8s ease-in-out, opacity 1.8s ease-in-out;
    stroke-dashoffset: 0;
    opacity: 1;
  }

  /* 外円がゆっくり閉じる（1.2秒） */
  .draw-circle {
    opacity: 1;
    transition: stroke-dashoffset 1.2s ease-in-out;
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<svg viewBox="0 0 200 200">
  <defs>
    <!-- 全体をふんわり煙らせるフィルター -->
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 先行する光の粒子（最初は中心付近に配置） -->
  <circle id="glow-particle" cx="100" cy="100" r="4" />

  <!-- ①葉っぱ -->
  <circle id="leaf" cx="100" cy="30" r="3" />

  <!-- ②線 -->
  <path id="line" d="M100 30 L150 100 L50 150 L120 170" 
        stroke-dasharray="300" stroke-dashoffset="300" />

  <!-- ③終点〇 -->
  <circle id="end" cx="120" cy="170" r="5" />

  <!-- ④他記号 -->
  <circle id="symbol1" cx="150" cy="100" r="4" />
  <circle id="symbol2" cx="50" cy="150" r="4" />

  <!-- ⑤外円 -->
  <circle id="outer" cx="100" cy="100" r="90" 
          stroke-dasharray="566" stroke-dashoffset="566"
          transform="rotate(-90 100 100)" />

</svg>

<script>
  const particle = document.getElementById("glow-particle");
  const leaf = document.getElementById("leaf");
  const line = document.getElementById("line");
  const end = document.getElementById("end");
  const symbol1 = document.getElementById("symbol1");
  const symbol2 = document.getElementById("symbol2");
  const outer = document.getElementById("outer");

  // === タイムライン（全体で約3.5秒の設計） ===

  // 0.0秒: 光の粒子がふんわり現れて、シジルの始点（100, 30）へ向かって動き回る
  setTimeout(() => {
    particle.style.opacity = "0.7";
    // 画面中央から始点へ、少しカーブを描くように移動（今回は簡易的にトランスフォームで制御）
    particle.style.transform = "translate(0px, -50px)";
  }, 10);

  // 0.5秒: 光が動き回っている最中に、最初の「葉っぱ」がふんわり出現
  setTimeout(() => {
    leaf.classList.add("fade-in");
  }, 500);

  // 0.8秒: 光が始点に到達し、じわーっと消えていく（残光フェードアウト開始）
  // ★ここの「0.8秒」のタイミングで、すでにシジルの線も同時に描き始め、0.2〜0.3秒ほど「光の残光」と重ならせます
  setTimeout(() => {
    particle.style.opacity = "0"; // 光はここで消え始める（残光化）
    line.classList.add("draw-line"); // 線がふんわり伸び始める（重なりスタート）
  }, 800);

  // 2.3秒: 線が描き終わる直前（0.8s + 1.8s = 2.6s の少し前）、終点〇が出現
  setTimeout(() => {
    end.classList.add("fade-in");
  }, 2300);

  // 2.5秒: 他の記号がふんわり出現
  setTimeout(() => {
    symbol1.classList.add("fade-in");
    symbol2.classList.add("fade-in");
  }, 2500);

  // 2.6秒: すべてのパーツが揃うのとほぼ同時に、外円が上からぐるっと回り始める
  setTimeout(() => {
    outer.classList.add("draw-circle");
  }, 2600); // 1.2秒かけて回るので、3.8秒あたりで完全静止
</script>

</body>
</html>
